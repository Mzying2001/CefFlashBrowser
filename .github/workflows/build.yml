name: Build

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub Release'
        required: true
        default: false
        type: boolean

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        platform: ['x86', 'x64']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.1

      - name: Find MSBuild
        id: find_msbuild
        shell: powershell
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $msbuild = & $vswhere -latest -requires Microsoft.Component.MSBuild `
            -find "MSBuild\**\Bin\amd64\MSBuild.exe" | Select-Object -First 1
          echo "msbuild=$msbuild" >> $env:GITHUB_OUTPUT

      - name: Extract version from csproj
        id: version
        shell: powershell
        run: |
          [xml]$xml = Get-Content "CefFlashBrowser\CefFlashBrowser.csproj"
          $version = $xml.Project.PropertyGroup.Version | Where-Object { $_ } | Select-Object -First 1
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Clean Release output
        shell: powershell
        run: |
          $binDir = "${{ github.workspace }}\bin"
          if ("${{ matrix.platform }}" -eq "x86") {
            $releaseDir = "$binDir\Release"
          } else {
            $releaseDir = "$binDir\${{ matrix.platform }}\Release"
          }
          if (Test-Path $releaseDir) {
            Remove-Item $releaseDir -Recurse -Force
          }

      - name: Build Release (${{ matrix.platform }})
        shell: powershell
        run: |
          $msbuild = "${{ steps.find_msbuild.outputs.msbuild }}"
          $sln = "${{ github.workspace }}\CefFlashBrowser.slnx"
          $env:DOTNET_MSBUILD_SDK_RESOLVER_CLI_DIR = "${{ env.DOTNET_ROOT }}"
          
          & $msbuild $sln -t:Rebuild `
            -p:Configuration=Release `
            -p:Platform=${{ matrix.platform }} `
            -restore -verbosity:minimal
          
          if ($LASTEXITCODE -ne 0) {
            exit 1
          }

      - name: Prepare artifact directory
        shell: powershell
        run: |
          $platform = "${{ matrix.platform }}"
          if ($platform -eq "x86") {
            $sourceDir = "${{ github.workspace }}\bin\Release"
          } else {
            $sourceDir = "${{ github.workspace }}\bin\$platform\Release"
          }
          
          $artifactDir = "${{ github.workspace }}\artifact_$platform"
          New-Item -ItemType Directory -Path $artifactDir -Force | Out-Null
          Copy-Item -Path "$sourceDir\*" -Destination $artifactDir -Recurse -Force

      - name: Create archive
        shell: powershell
        run: |
          $platform = "${{ matrix.platform }}"
          $version = "${{ steps.version.outputs.version }}"
          $artifactDir = "${{ github.workspace }}\artifact_$platform"
          $outputDir = "${{ github.workspace }}\dist"
          $zipName = "FlashBrowser_$platform`_v$version.zip"
          $zipPath = "$outputDir\$zipName"
          
          New-Item -ItemType Directory -Path $outputDir -Force | Out-Null
          Compress-Archive -Path $artifactDir -DestinationPath $zipPath -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlashBrowser_${{ matrix.platform }}_v${{ steps.version.outputs.version }}
          path: ${{ github.workspace }}/dist/FlashBrowser_${{ matrix.platform }}_v${{ steps.version.outputs.version }}.zip
          retention-days: 90

  create-release:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ inputs.create_release == true }}
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from csproj
        id: version
        run: |
          VERSION=$(grep -oP '<Version>\K[^<]+' CefFlashBrowser/CefFlashBrowser.csproj)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body: |
            # FlashBrowser Release v${{ steps.version.outputs.version }}
            
            ## 下载列表
            - FlashBrowser_x86_v${{ steps.version.outputs.version }}.zip
            - FlashBrowser_x64_v${{ steps.version.outputs.version }}.zip
            
            ## 系统要求
            - Windows 7 SP1 或更高版本
            - .NET Framework 4.6.2 或更高版本
            
            ## 架构说明
            - **x86**: 32 位应用，适合 32 位和 64 位 Windows 系统
            - **x64**: 64 位应用，仅适合 64 位 Windows 系统（推荐）
          files: artifacts/**/FlashBrowser_*.zip
          draft: false
          prerelease: false
